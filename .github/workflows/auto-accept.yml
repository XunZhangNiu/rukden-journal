name: иҮӘеҠЁеҪ•з”ЁжҠ•зЁҝпјҲд»…йҷҗдё»зј–пјү

on:
  discussion_comment:
    types: [created]

permissions:
  contents: write
  discussions: write

jobs:
  accept_article:
    if: |
      github.event.comment.user.login == 'XunZhangNiu' &&
      (github.event.comment.body == '/accept' || github.event.comment.body == '/еҪ•з”Ё')
    runs-on: ubuntu-latest

    steps:
      - name: жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: иҺ·еҸ–жҠ•зЁҝдҝЎжҒҜ
        id: post
        run: |
          BODY="${{ github.event.discussion.body }}"
          TITLE="${{ github.event.discussion.title }}"
          AUTHOR=$(echo "$BODY" | grep -A1 "## дҪңиҖ…" | tail -1 | sed 's/^[[:space:]]*//')
          [ -z "$AUTHOR" ] && AUTHOR="еҢҝеҗҚзҪ‘еҸӢ"
          CATEGORY=$(echo "$BODY" | grep -A1 "## еҲҶзұ»" | tail -1 | sed 's/^[[:space:]]*//')
          [ -z "$CATEGORY" ] && CATEGORY="рҹ“„ и®әи‘—"
          ABSTRACT=$(echo "$BODY" | sed -n '/## ж‘ҳиҰҒ/,/## е…Ёж–Ү/p' | sed '1d;$d' | tr '\n' ' ')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT
          echo "abstract=$ABSTRACT" >> $GITHUB_OUTPUT

      - name: иҺ·еҸ–ж–°ID
        id: id
        run: |
          MAX_ID=$(grep -o '"id": [0-9]*' articles.js | sed 's/"id": //' | sort -nr | head -1)
          [ -z "$MAX_ID" ] && MAX_ID=0
          echo "new_id=$((MAX_ID + 1))" >> $GITHUB_OUTPUT

      - name: ж·»еҠ ж–Үз« 
        run: |
          echo ',' >> articles.js
          echo '    {' >> articles.js
          echo '        id: '${{ steps.id.outputs.new_id }}, >> articles.js
          echo '        tag: "'${{ steps.post.outputs.category }}'",' >> articles.js
          echo '        title: "'${{ steps.post.outputs.title }}'",' >> articles.js
          echo '        authors: "'${{ steps.post.outputs.author }}'",' >> articles.js
          echo '        abstract: "'${{ steps.post.outputs.abstract }}'",' >> articles.js
          echo '        editorNote: "рҹҺү еҪ•з”ЁиҮӘ Discussions | е®ЎзЁҝдәә: @${{ github.actor }}",' >> articles.js
          echo '        fullContent: "<p>еҺҹж–Үи§Ғ GitHub Discussions</p>",' >> articles.js
          echo '        references: "https://github.com/${{ github.repository }}/discussions/${{ github.event.discussion.number }}"' >> articles.js
          echo '    }' >> articles.js

      - name: жҸҗдәӨжӣҙж”№
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "RUKDEN Bot"
          git config user.email "bot@rukden.local"
          git add articles.js
          git commit -m "иҮӘеҠЁеҪ•з”Ё: ${{ steps.post.outputs.title }}"
          git push
